<!DOCTYPE html>
<html>
<head>
    <title>Body Mass Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #dc3a3ac8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 22px;
        }
        .calculator {
            background: rgb(11, 198, 231);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 { text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; text-align: center; font-size: 18px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>Body Mass Calculator</h2>
        
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 70">
        </div>
        
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="e.g. 175">
        </div>
        
        <button onclick="calcBMI()">Calculate</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        function calcBMI() {
            var w = parseFloat(document.getElementById('weight').value);
            var h = parseFloat(document.getElementById('height').value);
            
            if (!w || !h) {
                alert("Please fill in both fields.");
                return;
            }
            
            var bmi = (w / ((h / 100) * (h / 100))).toFixed(1);
            var status = "";
            
            if (bmi < 18.5) status = "Underweight";
            else if (bmi < 25) status = "Normal weight";
            else if (bmi < 30) status = "Overweight";
            else status = "Obese";
            
            var resBox = document.getElementById('result');
            resBox.innerHTML = "Your Index: " + bmi + "<br>(" + status + ")";
            resBox.style.display = "block";
        }
    </script>

</body>
</html>
